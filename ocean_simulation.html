<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project Morpho | 海洋环境测试 (Marine Environment Test)</title>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #00040a;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--primary);
        }

        /* Mode Panel -> Archetype Switcher */
        #mode-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.4);
            color: var(--primary);
            padding: 10px 16px;
            cursor: pointer;
            font-family: monospace;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            text-align: right;
        }

        button:hover {
            background: rgba(0, 242, 255, 0.2);
            text-shadow: 0 0 8px var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        /* Control Instructions */
        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: right;
            font-size: 0.8rem;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Virtual JoyStick CSS */
        #joystick-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px var(--primary);
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <div id="ui-layer">
        <h1>PROJECT MORPHO: GENESIS LAB</h1>
    </div>

    <!-- 双轨制物种切换面板 -->
    <div id="mode-panel">
        <button id="btn-embryo">[GENESIS] 原始胚胎 (Embryo)</button>
        <button id="btn-medusa">[SANDBOX] 水母原型 (Medusa)</button>
        <button id="btn-arthropod">[SANDBOX] 龙虾原型 (Arthropod)</button>
        <button id="btn-octopus">[SANDBOX] 章鱼原型 (Cephalopod)</button>
    </div>

    <div id="instructions">
        PC: W/S (Thrust) | A/D (Yaw) | Drag Mouse (Pitch)<br>
        Mobile: L-Joystick (Propulsion) | R-Touch (Attitude)
    </div>

    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <!-- Three.js CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 0. Audio Engine (Deep Sea Ambient) ---
        let audioCtx, noiseNode, filterNode;
        let audioInitialized = false;

        function initAudio() {
            if (audioInitialized) return;
            audioInitialized = true;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1; // White Noise
            }
            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;

            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.value = 5000; // Shallow water initial
            filterNode.Q.value = 1.0;

            // Creak sounds simulated via oscillator
            const osc = audioCtx.createOscillator();
            osc.frequency.value = 100;
            const oscGain = audioCtx.createGain();
            oscGain.gain.value = 0;
            osc.connect(oscGain);
            oscGain.connect(filterNode);
            osc.start();

            // Random metallic creak generator
            setInterval(() => {
                if (camera && camera.position.y < -100) {
                    if (Math.random() > 0.7) {
                        osc.frequency.setValueAtTime(50 + Math.random() * 150, audioCtx.currentTime);
                        oscGain.gain.setValueAtTime(0, audioCtx.currentTime);
                        oscGain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                        oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                    }
                }
            }, 3000);

            noiseNode.connect(filterNode);
            filterNode.connect(audioCtx.destination);
            noiseNode.start();
        }

        // --- 1. Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x003366); // Start Shallow
        scene.fog = new THREE.FogExp2(0x003366, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        // --- 2. Lighting ---
        const ambientLight = new THREE.AmbientLight(0x101030, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0x00f2ff, 2.0);
        sunLight.position.set(2, 10, 5);
        scene.add(sunLight);

        // Deep sea bio-light placeholder attached to fish later

        // --- 3. The Isolated Isle (等轴测孤岛锚点) ---
        const isleGroup = new THREE.Group();
        isleGroup.position.set(0, -1.2, 0);

        const baseGeo = new THREE.CylinderGeometry(4, 4.5, 0.4, 32);
        const baseMat = new THREE.MeshStandardMaterial({
            color: 0x010101, roughness: 0.1, metalness: 0.5
        });
        const base = new THREE.Mesh(baseGeo, baseMat);
        isleGroup.add(base);

        const ringGeo = new THREE.RingGeometry(4.6, 4.8, 64);
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x00f2ff, transparent: true, opacity: 0.2, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.y = 0.21;
        isleGroup.add(ring);

        // Caustics projection layer inside isle
        const floorGeo = new THREE.PlaneGeometry(8, 8, 32, 32);
        const floorMat = new THREE.MeshPhongMaterial({
            color: 0x001a33, shininess: 100, transparent: true, opacity: 0.6
        });
        floorMat.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = { value: 0 };
            shader.fragmentShader = `
                uniform float uTime;
                ${shader.fragmentShader}
            `.replace(
                `#include <color_fragment>`,
                `#include <color_fragment>
                vec2 p = vUv * 10.0;
                float dist = 0.0;
                for(int i=0; i<3; i++) {
                    p += sin(p.yx * 1.5 + uTime * 0.5) * 0.5;
                    dist += length(p) * 0.05;
                }
                diffuseColor.rgb += vec3(0.1, 0.4, 0.5) * pow(sin(dist * 5.0), 10.0) * 0.5;
                `
            );
            floorMat.userData.shader = shader;
        };
        const floorMesh = new THREE.Mesh(floorGeo, floorMat);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.position.y = 0.22;
        isleGroup.add(floorMesh);
        scene.add(isleGroup);

        // --- 4. Ocean Environment Particles ---
        const partGeo = new THREE.BufferGeometry();
        const partCount = 3000;
        const posArray = new Float32Array(partCount * 3);
        const originalPosArray = new Float32Array(partCount * 3);
        const velArray = new Float32Array(partCount * 3);

        for (let i = 0; i < partCount * 3; i++) {
            const val = (Math.random() - 0.5) * 200; // Wider spread for depth
            posArray[i] = val; originalPosArray[i] = val; velArray[i] = 0;
        }
        partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const partMat = new THREE.PointsMaterial({
            size: 0.1, color: 0xffffff, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(partGeo, partMat);
        scene.add(particles);

        // --- 5. The Archetype Generator (Hox Segments) ---
        const fishGroup = new THREE.Group();
        scene.add(fishGroup);

        let currentArchetype = 'embryo';
        const organismState = {
            transmission: 0.8,
            metalness: 0.0,
            baseScale: 1.0,
            energyStorage: 100.0,
            coreMeshRef: null
        };

        const tentacles = [];
        const appendages = [];
        const bioLight = new THREE.PointLight(0x00f2ff, 1.0, 10);
        fishGroup.add(bioLight);

        const buildArchetype = (type) => {
            initAudio(); // Initialize audio context on player interaction
            currentArchetype = type;

            // Clear existing morphology
            while (fishGroup.children.length > 1) { // keep bioLight
                fishGroup.remove(fishGroup.children[1]);
            }
            tentacles.length = 0;
            appendages.length = 0;

            // Reset position
            fishGroup.position.set(0, 0, 0);
            velocity.set(0, 0, 0);

            // Base Material
            const mat = new THREE.MeshPhysicalMaterial({
                color: 0x00f2ff, metalness: 0.1, roughness: 0.5,
                transmission: 0.1, thickness: 0.5,
                emissive: 0x00f2ff, emissiveIntensity: 1.0, flatShading: true
            });

            if (type === 'embryo') {
                organismState.transmission = 0.8;
                organismState.metalness = 0.0;
                mat.transmission = 0.8;
                mat.metalness = 0.0;
                mat.color.setHex(0xaaffff);

                const geo = new THREE.SphereGeometry(0.3, 16, 16);
                organismState.coreMeshRef = new THREE.Mesh(geo, mat);
                fishGroup.add(organismState.coreMeshRef);
            }
            else if (type === 'medusa') {
                organismState.transmission = 0.9;
                organismState.metalness = 0.0;
                mat.transmission = 0.9;
                mat.roughness = 0.1;

                // Umbrella Cap
                const capGeo = new THREE.SphereGeometry(0.6, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
                organismState.coreMeshRef = new THREE.Mesh(capGeo, mat);
                // Rotate to face forward based on controls (cap opens backwards)
                organismState.coreMeshRef.rotation.x = Math.PI / 2;
                fishGroup.add(organismState.coreMeshRef);

                // 8 Tentacles
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const tGroup = new THREE.Group();
                    tGroup.position.set(Math.cos(angle) * 0.4, Math.sin(angle) * 0.4, 0.2); // Relative to facing direction

                    let parent = tGroup;
                    for (let j = 0; j < 5; j++) {
                        const seg = new THREE.Mesh(new THREE.CylinderGeometry(0.04 - j * 0.005, 0.04 - (j + 1) * 0.005, 0.3, 8), mat);
                        seg.position.z = 0.15;
                        seg.rotation.x = Math.PI / 2;

                        const pivot = new THREE.Group();
                        pivot.position.z = (j === 0) ? 0 : 0.3;
                        pivot.add(seg);
                        parent.add(pivot);
                        tentacles.push({ mesh: pivot, offset: i + j * 0.5, phase: j });
                        parent = pivot;
                    }
                    fishGroup.add(tGroup);
                }
            }
            else if (type === 'arthropod') {
                organismState.transmission = 0.0;
                organismState.metalness = 0.7;
                mat.transmission = 0.0;
                mat.metalness = 0.7;
                mat.roughness = 0.2;
                mat.color.setHex(0xffaa44); // Orangey color
                mat.emissive.setHex(0xffaa44);

                // Cephalothorax
                const headGeo = new THREE.BoxGeometry(0.6, 0.3, 0.8);
                organismState.coreMeshRef = new THREE.Mesh(headGeo, mat);
                fishGroup.add(organismState.coreMeshRef);

                // Abdomen Segments
                for (let i = 0; i < 4; i++) {
                    const abd = new THREE.Mesh(new THREE.BoxGeometry(0.5 - i * 0.1, 0.25, 0.3), mat);
                    abd.position.set(0, 0, 0.5 + i * 0.35);
                    fishGroup.add(abd);
                }

                // Claws (Appendages)
                for (let i = -1; i <= 1; i += 2) {
                    const armPiv = new THREE.Group();
                    armPiv.position.set(i * 0.4, 0, -0.3);
                    const armMesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.8), mat);
                    armMesh.position.set(0, 0, -0.4);
                    armPiv.add(armMesh);
                    armPiv.rotation.y = i * 0.3; // Angle outward
                    appendages.push({ pivot: armPiv, side: i });
                    fishGroup.add(armPiv);
                }
            }
            else if (type === 'octopus') {
                organismState.transmission = 0.2;
                organismState.metalness = 0.0;
                mat.transmission = 0.2;
                mat.roughness = 0.8;
                mat.color.setHex(0xff3366); // Default soft red
                mat.emissive.setHex(0xff3366);

                // Head (Elongated Sphere)
                const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
                organismState.coreMeshRef = new THREE.Mesh(headGeo, mat);
                organismState.coreMeshRef.scale.set(1.0, 1.0, 1.3);
                organismState.coreMeshRef.position.z = -0.1;
                fishGroup.add(organismState.coreMeshRef);

                // 6 flexible tentacles
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const tGroup = new THREE.Group();
                    tGroup.position.set(Math.cos(angle) * 0.4, -0.4, Math.sin(angle) * 0.2);

                    let parent = tGroup;
                    for (let j = 0; j < 6; j++) {
                        const seg = new THREE.Mesh(new THREE.CylinderGeometry(0.06 - j * 0.008, 0.05 - j * 0.008, 0.4, 8), mat);
                        seg.position.y = -0.2;

                        const pivot = new THREE.Group();
                        pivot.position.y = (j === 0) ? 0 : -0.4;
                        pivot.add(seg);
                        parent.add(pivot);
                        tentacles.push({ mesh: pivot, offset: i, phase: j });
                        parent = pivot;
                    }
                    fishGroup.add(tGroup);
                }
            }
        };

        // Attach Button Listeners
        document.getElementById('btn-embryo').addEventListener('click', () => buildArchetype('embryo'));
        document.getElementById('btn-medusa').addEventListener('click', () => buildArchetype('medusa'));
        document.getElementById('btn-arthropod').addEventListener('click', () => buildArchetype('arthropod'));
        document.getElementById('btn-octopus').addEventListener('click', () => buildArchetype('octopus'));

        // Load initial
        buildArchetype('embryo');

        // --- 6. Controls & Physics ---
        const input = { thrust: 0, yaw: 0, pitch: 0 };
        const keys = {};

        window.addEventListener('keydown', (e) => {
            initAudio(); // Init audio on key press too
            keys[e.code] = true;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let mousePitchActive = false;
        window.addEventListener('mousedown', () => { initAudio(); mousePitchActive = true; });
        window.addEventListener('mouseup', () => { mousePitchActive = false; input.pitch *= 0.8; });
        window.addEventListener('mousemove', (e) => {
            if (mousePitchActive) input.pitch = (e.clientY / window.innerHeight - 0.5) * 2.5;
        });

        // 变异入口集成 (Mutation Prompt Raycaster)
        const raycaster = new THREE.Raycaster();
        const mouseObj = new THREE.Vector2();
        window.addEventListener('dblclick', (e) => {
            mouseObj.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseObj.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouseObj, camera);
            const intersects = raycaster.intersectObjects(fishGroup.children, true);
            if (intersects.length > 0) {
                // 点击到了生物，唤起拟态输入框
                const intent = prompt("【Project Morpho 实验室】\n检测到生物体选定。请输入变异意图（例如：进化出喷气推进口，以适应深海高压）：", "");
                if (intent) {
                    console.log("[Mock AI Arbitrator] Processing intent:", intent);
                    alert("🧬 AI 裁判系统已接收意图：\n\"" + intent + "\"\n\n正在转化为 JSON Patch 并提交 Wasm 物理极限校验...");
                }
            }
        });

        // Joystick (Simplified logic to save space)
        // ... (Skipping verbose joystick logic, relying on WASD/Mouse for demo)

        // --- 7. Deep Sea Sync & Animation Loop ---
        let velocity = new THREE.Vector3();
        const clock = new THREE.Clock();

        function update() {
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            // Inputs
            if (keys['KeyW']) input.thrust = THREE.MathUtils.lerp(input.thrust, 1.0, 0.1);
            else if (keys['KeyS']) input.thrust = THREE.MathUtils.lerp(input.thrust, -0.5, 0.1);
            else input.thrust = THREE.MathUtils.lerp(input.thrust, 0.0, 0.05);

            if (keys['KeyA']) input.yaw = THREE.MathUtils.lerp(input.yaw, 1.0, 0.1);
            else if (keys['KeyD']) input.yaw = THREE.MathUtils.lerp(input.yaw, -1.0, 0.1);
            else input.yaw = THREE.MathUtils.lerp(input.yaw, 0.0, 0.1);

            // ATP Simulation
            const metabolicCost = (0.5 + Math.abs(input.thrust) * 5.0) * dt;
            organismState.energyStorage = Math.max(0, organismState.energyStorage - metabolicCost);
            if (Math.abs(input.thrust) < 0.1) organismState.energyStorage = Math.min(100, organismState.energyStorage + 2.0 * dt);
            const energyFactor = organismState.energyStorage / 100.0;

            // Movement Physical
            const speed = 8.0 * energyFactor * (currentArchetype === 'medusa' ? 0.8 : (currentArchetype === 'embryo' ? 0.5 : 1.2));
            fishGroup.rotation.y += input.yaw * 2.0 * dt;
            fishGroup.rotation.x = THREE.MathUtils.lerp(fishGroup.rotation.x, input.pitch, 0.1);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(fishGroup.quaternion);
            velocity.lerp(dir.multiplyScalar(input.thrust * speed), 0.05);
            fishGroup.position.add(velocity.clone().multiplyScalar(dt));

            // Deep Sea Atmosphere Axis & Wasm Scale Compression (Mock)
            const y = fishGroup.position.y;
            let targetFogColor = new THREE.Color(0x003366);
            let targetFogDensity = 0.015;
            let targetCausticsOp = 0.6;

            if (y < -200) {
                targetFogColor.setHex(0x000510);
                targetFogDensity = 0.035;
                targetCausticsOp = 0.0;
            } else if (y < -50) {
                const ratio = (-y - 50) / 150.0; // 0 to 1
                targetFogColor.lerpColors(new THREE.Color(0x001a33), new THREE.Color(0x000510), ratio);
                targetFogDensity = THREE.MathUtils.lerp(0.02, 0.035, ratio);
                targetCausticsOp = THREE.MathUtils.lerp(0.3, 0.0, ratio);
            }

            scene.background.lerp(targetFogColor, 0.05);
            scene.fog.color.lerp(targetFogColor, 0.05);
            scene.fog.density = THREE.MathUtils.lerp(scene.fog.density, targetFogDensity, 0.05);
            floorMat.opacity = THREE.MathUtils.lerp(floorMat.opacity, targetCausticsOp, 0.05);

            // Audio Filter Depth Mapping
            if (filterNode) {
                // map y to frequency: 0 -> 5000, -200 -> 300
                const targetFreq = Math.max(200, 5000 + y * (4800 / 200));
                filterNode.frequency.value += (targetFreq - filterNode.frequency.value) * 0.1;
            }

            // High Pressure Scale Compression Animation
            const pressureCompression = Math.max(0.7, 1.0 + Math.min(0, y) * 0.001);

            // Morphology Animations
            const pulseScale = 1.0 + Math.sin(time * (1.0 + input.thrust * 3)) * 0.03 * energyFactor;

            if (organismState.coreMeshRef) {
                // Apply Scale
                fishGroup.scale.setScalar(pulseScale * organismState.baseScale * pressureCompression);

                // Emissive Bioluminescence logic
                const flicker = organismState.energyStorage < 20 ? (Math.sin(time * 20) * 0.5 + 0.5) : 1.0;
                organismState.coreMeshRef.material.emissiveIntensity = energyFactor * 2.0 * flicker;
                bioLight.intensity = energyFactor * 1.5 * flicker;

                // Lateral Line Sensing (Ripple warning near bounds)
                const distOrigin = Math.sqrt(fishGroup.position.x ** 2 + fishGroup.position.z ** 2);
                if (distOrigin > 35) { // approaching edge
                    organismState.coreMeshRef.material.emissive.setHex(0xff3333); // Red Warning Flash
                } else {
                    // Restore default based on archetype
                    if (currentArchetype === 'arthropod') organismState.coreMeshRef.material.emissive.setHex(0xffaa44);
                    else if (currentArchetype === 'octopus') organismState.coreMeshRef.material.emissive.setHex(0xff3366);
                    else organismState.coreMeshRef.material.emissive.setHex(0x00f2ff);
                }

                // Archetype specifics
                if (currentArchetype === 'medusa') {
                    // Contraction driven by thrust and time
                    const contractForce = Math.sin(time * 5.0 * energyFactor) * Math.max(0.2, Math.abs(input.thrust));
                    organismState.coreMeshRef.scale.x = 1.0 + contractForce * 0.2;
                    organismState.coreMeshRef.scale.z = 1.0 + contractForce * 0.2;
                    organismState.coreMeshRef.scale.y = 1.0 - contractForce * 0.1;

                    tentacles.forEach(t => {
                        t.mesh.rotation.x = Math.sin(time * 4 * energyFactor - t.offset - t.phase * 0.5) * (0.2 + 0.3 * input.thrust);
                    });
                } else if (currentArchetype === 'arthropod') {
                    // Claw opening closing based on speed
                    appendages.forEach(a => {
                        // Pinching motion
                        a.pivot.rotation.y = a.side * (0.3 + Math.sin(time * 10 * Math.abs(input.thrust)) * 0.2);
                    });
                } else if (currentArchetype === 'octopus') {
                    // Stretch body when swimming fast
                    const drag = input.thrust * 1.2;
                    organismState.coreMeshRef.scale.y = 1.0 + drag * 0.1;
                    tentacles.forEach(t => {
                        // Tentacles drag backward and wiggle
                        t.mesh.rotation.x = drag + Math.sin(time * 3 * energyFactor - t.offset - t.phase * 0.5) * 0.15;
                        t.mesh.rotation.z = Math.cos(time * 2 * energyFactor - t.offset) * 0.1;
                    });
                }
            }

            // Ring Base Pulse
            ringMat.opacity = 0.1 + Math.sin(time * 2) * 0.1;

            if (floorMat.userData.shader) {
                floorMat.userData.shader.uniforms.uTime.value = time;
            }

            // Camera follow (Third Person)
            const offset = new THREE.Vector3(0, 1.5, 5).applyQuaternion(fishGroup.quaternion);
            camera.position.lerp(fishGroup.position.clone().add(offset), 0.1);
            camera.lookAt(fishGroup.position);

            // Particles
            for (let i = 0; i < partCount * 3; i += 3) {
                originalPosArray[i + 1] -= 0.02; // sink
                if (originalPosArray[i + 1] < -250) originalPosArray[i + 1] = 50;

                // Keep particles relative around camera
                if (posArray[i] - camera.position.x > 100) posArray[i] -= 200;
                else if (posArray[i] - camera.position.x < -100) posArray[i] += 200;
                if (posArray[i + 2] - camera.position.z > 100) posArray[i + 2] -= 200;
                else if (posArray[i + 2] - camera.position.z < -100) posArray[i + 2] += 200;
            }
            partGeo.attributes.position.array.set(originalPosArray); // Simplified non-colliding drift
            partGeo.attributes.position.needsUpdate = true;
        }

        function render() {
            update();
            renderer.render(scene, camera);
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        render();
    </script>
</body>

</html>
