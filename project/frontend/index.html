<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Morpho - Edge Evolution</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            max-width: 300px;
        }
        
        .controls {
            margin-top: 15px;
        }
        
        button {
            background: #44aa88;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        
        button:hover {
            background: #339977;
        }
        
        #ai-log {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <h2>🧬 Project Morpho</h2>
        <p>Edge Evolution Simulator</p>
        
        <div class="controls">
            <button onclick="triggerEnvironment('drought')">🌵 Drought</button>
            <button onclick="triggerEnvironment('flood')">🌊 Flood</button>
            <button onclick="triggerEnvironment('extreme cold')">❄️ Cold</button>
            <button onclick="triggerEnvironment('high radiation')">☢️ Radiation</button>
            <button onclick="triggerEnvironment('high gravity')">⚡ Gravity</button>
        </div>
        
        <div id="ai-log">
            AI Evolution Log will appear here...
        </div>
    </div>
    
    <script type="module" src="./src/main.js"></script>
</body>
</html>
