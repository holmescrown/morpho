<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Project Morpho - MVP 观测舱</title>
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        :root {
            --accent-color: #00f2ff;
            --bg-deep: #000510;
            --text-main: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --consciousness-purple: #8800ff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
        }

        /* 1. 全屏渲染容器 */
        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: radial-gradient(circle at center, #001a33 0%, #000510 100%);
        }

        /* 2. UI 根容器 */
        #ui-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            pointer-events: none;
        }

        /* 阶段 1：意识同步登录遮罩 (Login / Landing) */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
            pointer-events: auto;
        }

        /* 呼吸光环 */
        .sync-halo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--consciousness-purple);
            box-shadow: 0 0 20px var(--consciousness-purple), inset 0 0 10px var(--consciousness-purple);
            animation: breathe 3s infinite ease-in-out;
            margin-bottom: 60px;
            position: relative;
        }

        .sync-halo::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: var(--consciousness-purple);
            border-radius: 50%;
            filter: blur(8px);
            animation: pulse-core 3s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
                box-shadow: 0 0 20px var(--consciousness-purple);
            }

            50% {
                transform: scale(1.3);
                opacity: 1;
                box-shadow: 0 0 40px var(--consciousness-purple);
            }
        }

        @keyframes pulse-core {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.9;
            }
        }

        /* 同步按钮 */
        .sync-btn {
            background: rgba(136, 0, 255, 0.1);
            border: 1px solid rgba(136, 0, 255, 0.3);
            color: var(--consciousness-purple);
            padding: 15px 40px;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            pointer-events: auto;
        }

        .sync-btn:hover {
            background: rgba(136, 0, 255, 0.3);
            box-shadow: 0 0 15px var(--consciousness-purple);
            text-shadow: 0 0 8px #fff;
        }

        /* 波纹转场特效 */
        .ripple-expansion {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, rgba(136, 0, 255, 0.8) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(1);
            opacity: 0;
            pointer-events: none;
            z-index: 10001;
        }

        .ripple-active {
            animation: expanding-ripple 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes expanding-ripple {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                filter: blur(10px);
            }

            100% {
                transform: translate(-50%, -50%) scale(300);
                opacity: 0;
                filter: blur(50px);
            }
        }

        /* 3. 核心组件：毛玻璃进化舱 (Evolution Pod) */
        .evolution-pod {
            position: absolute;
            left: 40px;
            bottom: 40px;
            width: 320px;
            padding: 24px;
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        .evolution-pod.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .evolution-pod.minimized {
            transform: translateX(-380px);
            opacity: 0;
        }

        /* 4. 文字叙事：感官映射 (Sensory Typography) */
        .sensory-log {
            position: absolute;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
            text-align: center;
            max-width: 600px;
            font-family: 'Space Mono', monospace;
            color: rgba(136, 0, 255, 0.9);
            text-shadow: 0 0 15px rgba(136, 0, 255, 0.6);
            letter-spacing: 2px;
            line-height: 1.6;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s;
        }

        .sensory-log.visible {
            opacity: 1;
        }

        /* 5. 极低能量脉冲边缘 (Vignette) */
        #vignette-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 1);
            transition: box-shadow 0.5s;
        }

        #vignette-overlay.low-atp {
            box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.3);
            animation: pulse-vignette 2s infinite ease-in-out;
        }

        @keyframes pulse-vignette {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.7;
            }
        }

        /* 统一输入框与按钮 */
        .glass-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            margin-bottom: 12px;
            outline: none;
            transition: border 0.3s;
            box-sizing: border-box;
        }

        .glass-input:focus {
            border-color: var(--accent-color);
        }

        .btn-evolve {
            width: 100%;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-evolve:hover {
            background: #60f9ff;
            transform: scale(1.02);
        }

        /* 调试面板收纳盒 (Tab 切换) */
        #mode-panel {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s;
            transform: translateX(20px);
        }

        #mode-panel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        .mode-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            padding: 10px 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
    </style>
</head>

<body>
    <!-- 1. 全屏渲染容器 -->
    <div id="webgl-container"></div>

    <!-- 2. UI 穿透层 -->
    <div id="ui-root">
        <!-- 阶段 1：意识同步遮罩 -->
        <div id="login-overlay">
            <div class="sync-halo"></div>
            <button class="sync-btn" onclick="syncConsciousness()">Sync Consciousness</button>
            <div id="ripple" class="ripple-expansion"></div>
        </div>

        <!-- 极低能量脉冲边缘 (Vignette) -->
        <div id="vignette-overlay"></div>

        <!-- 感官叙事文字 (Sensory Typography) -->
        <div id="sensory-log" class="sensory-log">
            [意识同步中...]
        </div>

        <!-- 核心组件：毛玻璃进化舱 (Evolution Pod) -->
        <div id="evolution-pod" class="evolution-pod">
            <div id="ui-toggle" onclick="toggleEvolutionPod()"
                style="position: absolute; top: 12px; right: 12px; cursor: pointer; opacity: 0.5;">×</div>
            <h3 style="margin: 0 0 4px 0; color: var(--accent-color); letter-spacing: 2px;">MORPHO LAB</h3>
            <p
                style="font-size: 11px; color: var(--text-secondary); margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px;">
                边缘演化观测站 v3.0</p>

            <div id="mutation-form" style="display: flex; flex-direction: column; gap: 12px;">
                <select id="mutation-part" class="glass-input" style="margin-bottom: 0;">
                    <option value="morphology">形态系统 (Morphology)</option>
                    <option value="metabolism">代谢系统 (Metabolism)</option>
                    <option value="genetics">核心基因 (Genetics)</option>
                </select>
                <textarea id="mutation-intent" class="glass-input" rows="3" style="resize: none;"
                    placeholder="描述变异意图...&#10;例：强化推进器效率" maxlength="100"></textarea>
                <button class="btn-evolve" id="btn-submit-mutation" onclick="window.submitMutation()">🧬 提交变异申请</button>
                <button class="btn-evolve"
                    style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;"
                    onclick="takePhotograph()">📸 捕获语义快照</button>
                <button class="btn-evolve"
                    style="background: transparent; border: 1px solid rgba(255,204,0,0.3); color: #ffcc00;"
                    onclick="window.toggleLegacyGallery()">🏛️ 遗产陈列室与谱系图</button>
            </div>

            <!-- 创造者之眼 上传区 (简化版) -->
            <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px;">
                <label for="photo-input" id="photo-label"
                    style="display: block; text-align: center; padding: 10px; border: 1px dashed rgba(255,255,255,0.2); border-radius: 12px; cursor: pointer; color: var(--text-secondary); font-size: 12px;">
                    📷 上传照片驱动进化
                </label>
                <input type="file" id="photo-input" accept="image/*" style="display:none"
                    onchange="handlePhotoUpload(this)">
                <canvas id="photo-preview" width="280" height="80"
                    style="width: 100%; border-radius: 8px; margin-top: 8px; display: none;"></canvas>
            </div>
        </div>

        <!-- 调试/控制面板 -->
        <div id="mode-panel">
            <button class="mode-btn" onclick="window.setAppMode('embryo')">ORIGIN: EMBRYO</button>
            <button class="mode-btn" onclick="window.setAppMode('medusa')">ARCHETYPE: MEDUSA</button>
            <button class="mode-btn" onclick="window.setAppMode('arthropod')">ARCHETYPE: ARTHROPOD</button>
            <button class="mode-btn" onclick="window.setAppMode('octopus')">ARCHETYPE: OCTOPUS</button>
            <div style="height: 1px; background: rgba(255,0,0,0.2); margin: 5px 0;"></div>
            <button class="mode-btn" style="color: #ff5555;" onclick="window.debugTriggerAcidification()">☣️ TRIGGER
                ACID</button>
            <button class="mode-btn" style="color: #ff0000;" onclick="window.debugForceDeath()">💀 FORCE
                TERMINATE</button>
        </div>
    </div>

    <!-- 本地遗产陈列室 (Legacy Gallery) -->
    <div id="legacy-gallery"
        style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 5, 16, 0.95); z-index: 10000; padding: 40px; box-sizing: border-box; flex-direction: column; align-items: center; justify-content: flex-start; backdrop-filter: blur(25px);">
        <div
            style="width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 20px; margin-bottom: 30px;">
            <h2 style="margin: 0; color: #ffcc00; letter-spacing: 4px; font-weight: 300;">LEGACY ARCHIVE <span
                    style="font-size: 12px; color: var(--text-secondary); letter-spacing: 1px;">// 数字化石展览馆与谱系网络</span>
            </h2>
            <div style="cursor: pointer; color: #fff; font-size: 32px; opacity: 0.6; line-height: 1;"
                onclick="window.toggleLegacyGallery()">×</div>
        </div>

        <!-- 进化谱系树 Canvas 区域 -->
        <div
            style="width: 100%; max-width: 1000px; padding: 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; margin-bottom: 30px;">
            <h4 style="margin: 0 0 15px 0; color: #aaa; font-weight: 400; text-transform: uppercase;">Phylogeny Tree /
                进化序列谱系图</h4>
            <canvas id="phylogeny-canvas" width="960" height="200"
                style="width: 100%; height: 200px; background: rgba(0,0,0,0.3); border-radius: 8px;"></canvas>
        </div>

        <!-- 化石陈列网格 -->
        <div id="fossil-grid"
            style="width: 100%; max-width: 1000px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; overflow-y: auto;">
            <!-- 画廊卡片通过 main.js 动态注入 -->
        </div>
    </div>
    </div>

    <script type="module" src="./src/main.js"></script>

    <!-- GM Panel (保持精简) -->
    <div id="gm-panel"
        style="display: none; position: fixed; left: 20px; top: 20px; width: 200px; padding: 15px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-radius: 15px; z-index: 10000; border: 1px solid rgba(255,255,255,0.1);">
        <div style="color: #ffca28; font-size: 12px; margin-bottom: 10px; font-weight: bold;">GM ACCESS</div>
        <button onclick="triggerGMDisaster()"
            style="width:100%; padding:8px; background:#444; color:white; border:none; border-radius:5px; margin-bottom:5px;">TRIGGER
            DISASTER</button>
        <button onclick="toggleGMBypass()" id="gm-bypass-btn"
            style="width:100%; padding:8px; background:#444; color:white; border:none; border-radius:5px;">BYPASS:
            OFF</button>
    </div>
    <div id="gm-trigger"
        style="position: fixed; left: 0; bottom: 0; width: 40px; height: 40px; z-index: 10001; cursor: pointer;"
        onclick="onGMTriggerClick()"></div>

    <script>
        let gmClicks = 0;
        let gmTimer = null;
        function onGMTriggerClick() {
            gmClicks++;
            clearTimeout(gmTimer);
            gmTimer = setTimeout(() => { gmClicks = 0; }, 2000);
            if (gmClicks >= 5) activateGM();
        }
        function activateGM() {
            const p = document.getElementById('gm-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        async function triggerGMDisaster() {
            const env = "GM_DISASTER"; // Simplified for this example
            const btn = event.target;
            btn.innerText = "下令中...";
            btn.disabled = true;

            try {
                // Simulate API call
                await new Promise(resolve => setTimeout(resolve, 500));
                console.log("GM Disaster triggered:", env);
                if (window.triggerEnvironment) window.triggerEnvironment(env);
                alert("全球灾变已下发：" + env);
            } catch (e) {
                alert("执行失败: " + e);
            } finally {
                btn.innerText = "TRIGGER DISASTER";
                btn.disabled = false;
            }
        }

        let gmBypass = false;
        function toggleGMBypass() {
            gmBypass = !gmBypass;
            const btn = document.getElementById('gm-bypass-btn');
            btn.innerText = `BYPASS: ${gmBypass ? 'ON' : 'OFF'}`;
            btn.style.background = gmBypass ? '#2e7d32' : '#444';
            window.isGMBypass = gmBypass;
        }

        function toggleEvolutionPod() {
            document.getElementById('evolution-pod').classList.toggle('minimized');
        }

        // Tab 键切换 UI 面板
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const pod = document.getElementById('evolution-pod');
                const panel = document.getElementById('mode-panel');
                pod.classList.toggle('visible');
                panel.classList.toggle('visible');
            }
        });

        function syncConsciousness() {
            const btn = document.querySelector('.sync-btn');
            btn.disabled = true;
            btn.style.opacity = '0';
            document.getElementById('ripple').classList.add('ripple-active');

            setTimeout(() => {
                if (window.initGameAudio) window.initGameAudio();
                const overlay = document.getElementById('login-overlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.visibility = 'hidden';
                    if (window.onSyncComplete) window.onSyncComplete();

                    setTimeout(() => {
                        document.getElementById('evolution-pod').classList.add('visible');
                        document.getElementById('sensory-log').classList.add('visible');
                        document.getElementById('sensory-log').innerText = "[ 意识连接已建立。开始物种起源解降。 ]";
                    }, 1500);
                }, 1500);
            }, 1000);
        }

        // inline 的 submitMutation 已移除，统一切换至 main.js 中的 window.submitMutation 避免作用域覆盖

        function handlePhotoUpload(input) {
            const file = input.files[0];
            if (!file) return;
            window.updateSensoryLog("[ 正在解析现实快照。提取生物识别特征... ]", "#8800ff");

            const reader = new FileReader();
            reader.onload = (e) => {
                const canvas = document.getElementById('photo-preview');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    canvas.style.display = 'block';
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    submitMutation();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function takePhotograph() {
            window.updateSensoryLog("[ 正在捕获语义快照。存档至记忆宫殿... ]", "#00f2ff");
            const overlay = document.createElement('div');
            overlay.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;background:#fff;z-index:10002;pointer-events:none;opacity:0.8;";
            document.body.appendChild(overlay);
            setTimeout(() => {
                overlay.style.transition = "opacity 0.5s";
                overlay.style.opacity = '0';
                setTimeout(() => document.body.removeChild(overlay), 500);
            }, 50);
        }

        // 统一日志接口
        window.updateSensoryLog = (text, color = null) => {
            const log = document.getElementById('sensory-log');
            log.innerText = text;
            if (color) log.style.color = color;
            log.classList.remove('visible');
            void log.offsetWidth; // trigger reflow
            log.classList.add('visible');
        };

        // 绑定旧版 log 元素至新系统
        setInterval(() => {
            const oldLog = document.getElementById('ai-log');
            if (oldLog && oldLog.innerText.trim() !== "" && !oldLog.dataset.processed) {
                window.updateSensoryLog(oldLog.innerText);
                oldLog.dataset.processed = "true";
            }
        }, 500);
    </script>
</body>

</html>
